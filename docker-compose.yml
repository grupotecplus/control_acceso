services:
  hardhat-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hardhat-node
    ports:
      - "8545:8545"
    volumes:
      - ./artifacts:/app/artifacts
      - ./cache:/app/cache
    env_file:
      - .env

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api-accesos:
    build: ./api-accesos
    container_name: api-accesos
    ports:
      - "8001:8000"   # afuera 8001, adentro 8000
    env_file:
      - .env
    depends_on:
      - postgres
      - hardhat-node

volumes:
  postgres_data:
